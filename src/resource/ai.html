<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能助手 | libhv Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.0/dist/purify.min.js"></script>
    
    <style>
        body {
            font-family: 'Inter', "Microsoft YaHei", sans-serif;
            background: #f3f4f6;
        }
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .message-bubble {
            max-width: 85%;
            transition: all 0.2s ease;
        }
        .message-user {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message-ai {
            background: white;
            color: #1f2937;
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .typing-dot {
            width: 6px;
            height: 6px;
            background: #9ca3af;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div class="h-full flex">
        <aside class="w-[300px] bg-white border-r border-gray-200 flex flex-col">
            <div class="h-16 px-4 flex items-center gap-3 border-b border-gray-100">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i data-lucide="bot" class="text-white w-6 h-6"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="text-sm font-semibold text-gray-900 truncate">AI Assistant</div>
                    <div class="text-xs text-gray-500 truncate">会话管理</div>
                </div>
            </div>

            <div class="p-4">
                <button id="newSessionBtn" type="button" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2.5 rounded-xl shadow-sm transition-colors">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    <span>新对话</span>
                </button>
            </div>

            <div class="px-2 pb-2 flex-1 overflow-y-auto">
                <div class="px-3 py-2 text-xs font-semibold text-gray-500">会话列表</div>
                <div id="sessionList" class="space-y-1"></div>
            </div>

            <div class="p-4 border-t border-gray-100">
                <button onclick="window.location.href='/login'" class="w-full flex items-center justify-center gap-2 text-gray-600 hover:text-red-600 transition-colors text-sm font-medium">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    <span>退出登录</span>
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col">
            <header class="h-16 bg-white/80 backdrop-blur border-b border-gray-200 flex items-center justify-between px-6">
                <div class="flex items-center gap-2 text-gray-500">
                    <i data-lucide="messages-square" class="w-5 h-5"></i>
                    <span id="sessionTitle" class="text-sm font-medium text-gray-700 truncate max-w-[320px]">新对话</span>
                </div>

                <div class="flex items-center gap-3">
                    <div class="flex items-center space-x-2 bg-gray-100 px-3 py-1.5 rounded-full border border-gray-200">
                        <i data-lucide="layers" class="w-4 h-4 text-gray-500"></i>
                        <select id="modelType" class="bg-transparent text-sm font-medium focus:outline-none cursor-pointer">
                            <option value="1">阿里百炼 (Qwen)</option>
                            <option value="2">豆包 (Doubao)</option>
                            <option value="3">DeepSeek R1</option>
                        </select>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-hidden bg-gray-50">
                <div id="chatScroll" class="h-full overflow-y-auto px-4 sm:px-8 py-6">
                    <div class="max-w-4xl mx-auto">
                        <div id="emptyState" class="min-h-[calc(100vh-16rem)] flex flex-col items-center justify-center text-center gap-6">
                            <div class="text-3xl sm:text-4xl font-semibold text-gray-900">你好，我是 AI Assistant</div>
                            <div class="text-sm text-gray-500">你可以从下面挑选一个问题快速开始</div>
                            <div id="suggestions" class="flex flex-wrap justify-center gap-3 max-w-3xl"></div>
                        </div>

                        <div id="messages" class="space-y-4 hidden"></div>
                    </div>
                </div>
            </main>

            <footer class="p-4 sm:p-6 bg-gray-50 border-t border-gray-200">
                <div class="max-w-4xl mx-auto relative">
                    <form id="chat-form" class="relative">
                        <textarea 
                            id="question" 
                            rows="1" 
                            placeholder="请输入你的问题..."
                            class="w-full pl-4 pr-14 py-4 glass rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none text-gray-700 leading-relaxed transition-all"
                            required
                        ></textarea>
                        <button 
                            type="submit" 
                            class="absolute right-2 top-2 bottom-2 bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl shadow-md transition-all hover:scale-105 active:scale-95 disabled:opacity-50 disabled:scale-100"
                            id="send-btn"
                        >
                            <i data-lucide="send" class="w-5 h-5"></i>
                        </button>
                    </form>
                    <p class="text-center text-[10px] text-gray-400 mt-2">基于 libhv 构建的极简 AI 后端服务</p>
                </div>
            </footer>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const sessionList = document.getElementById('sessionList');
        const sessionTitle = document.getElementById('sessionTitle');
        const chatForm = document.getElementById('chat-form');
        const questionInput = document.getElementById('question');
        const modelTypeSelect = document.getElementById('modelType');
        const sendBtn = document.getElementById('send-btn');
        const newSessionBtn = document.getElementById('newSessionBtn');
        const chatScroll = document.getElementById('chatScroll');
        const emptyState = document.getElementById('emptyState');
        const messagesEl = document.getElementById('messages');
        const suggestionsEl = document.getElementById('suggestions');
        let currentSessionId = '';
        let sessionsCache = [];

        const suggestionPresets = [
            '给我一个学习 C++ 的路线建议',
            '解释一下 JWT 的工作原理',
            '帮我写一个 MySQL 表设计用于聊天记录',
            '如何让我的接口更安全？',
            '给我一个前端页面布局优化建议',
            '如何做一次完整的服务端日志设计？'
        ];

        function showEmptyState(show) {
            emptyState.classList.toggle('hidden', !show);
            messagesEl.classList.toggle('hidden', show);
        }

        function resetInputHeight() {
            questionInput.style.height = 'auto';
        }

        function scrollToBottom() {
            chatScroll.scrollTo({ top: chatScroll.scrollHeight, behavior: 'smooth' });
        }

        function renderSuggestions() {
            suggestionsEl.innerHTML = '';
            for (const text of suggestionPresets) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'px-4 py-2 rounded-full bg-white border border-gray-200 text-sm text-gray-700 hover:border-blue-300 hover:text-blue-700 hover:bg-blue-50 transition-colors';
                btn.textContent = text;
                btn.addEventListener('click', () => {
                    questionInput.value = text;
                    questionInput.dispatchEvent(new Event('input'));
                    chatForm.dispatchEvent(new Event('submit'));
                });
                suggestionsEl.appendChild(btn);
            }
        }

        async function createSession(title = '') {
            const resp = await fetch('/chat/session/new', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title })
            });
            const data = await resp.json();
            if (data && data.success && data.sessionId) {
                return data.sessionId;
            }
            return '';
        }

        async function deleteSession(sessionId) {
            const resp = await fetch('/chat/session/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId })
            });
            return resp.ok;
        }

        function renderSessionList() {
            sessionList.innerHTML = '';
            for (const s of sessionsCache) {
                const item = document.createElement('button');
                item.type = 'button';
                const active = s.sessionId === currentSessionId;
                item.className = [
                    'group w-full text-left px-3 py-2 rounded-xl border transition-colors',
                    active ? 'bg-blue-50 border-blue-200' : 'bg-white border-transparent hover:bg-gray-50 hover:border-gray-200'
                ].join(' ');
                item.innerHTML = `
                    <div class="flex items-start gap-2">
                        <div class="mt-[2px] text-gray-400">
                            <i data-lucide="message-circle" class="w-4 h-4"></i>
                        </div>
                        <div class="min-w-0 flex-1">
                            <div class="text-sm font-medium ${active ? 'text-blue-700' : 'text-gray-800'} truncate">${(s.title || '新对话')}</div>
                            <div class="text-xs text-gray-500 truncate">${s.sessionId}</div>
                        </div>
                        <div class="flex-shrink-0">
                            <button type="button" data-delete-session-id="${s.sessionId}" class="opacity-0 group-hover:opacity-100 transition-opacity text-red-500 hover:text-red-600 p-1 rounded-lg hover:bg-red-50">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                `;
                item.addEventListener('click', async () => {
                    if (s.sessionId === currentSessionId) return;
                    currentSessionId = s.sessionId;
                    localStorage.setItem('chat_current_session', currentSessionId);
                    sessionTitle.textContent = s.title || '新对话';
                    renderSessionList();
                    await loadHistory(currentSessionId);
                });
                sessionList.appendChild(item);
            }
            lucide.createIcons();

            sessionList.querySelectorAll('[data-delete-session-id]').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const sid = btn.getAttribute('data-delete-session-id');
                    if (!sid) return;
                    const ok = window.confirm('确认删除该会话？该会话下的聊天记录也会被删除。');
                    if (!ok) return;

                    const deleted = await deleteSession(sid);
                    if (!deleted) {
                        alert('删除失败，请稍后重试。');
                        return;
                    }

                    if (sid === currentSessionId) {
                        localStorage.removeItem('chat_current_session');
                    }
                    await loadSessions();
                });
            });
        }

        async function loadSessions(preferSessionId = '') {
            const resp = await fetch('/chat/sessions?limit=50');
            const data = await resp.json();
            const sessions = (data && data.success && Array.isArray(data.sessions)) ? data.sessions : [];
            sessionsCache = sessions;

            if (sessionsCache.length === 0) {
                const sid = await createSession('新对话');
                if (!sid) return;
                sessionsCache = [{ sessionId: sid, title: '新对话', createdAtMs: Date.now() }];
            }

            const stored = localStorage.getItem('chat_current_session') || '';
            const candidate = preferSessionId || stored || sessionsCache[0].sessionId;
            currentSessionId = sessionsCache.some(s => s.sessionId === candidate) ? candidate : sessionsCache[0].sessionId;
            localStorage.setItem('chat_current_session', currentSessionId);

            const active = sessionsCache.find(s => s.sessionId === currentSessionId);
            sessionTitle.textContent = (active && active.title) ? active.title : '新对话';

            renderSessionList();
            await loadHistory(currentSessionId);
        }

        function clearMessages() {
            messagesEl.innerHTML = '';
        }

        async function loadHistory(sessionId) {
            clearMessages();
            if (!sessionId) {
                showEmptyState(true);
                return;
            }
            const resp = await fetch('/chat/history', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId, limit: 200, offset: 0 })
            });
            const data = await resp.json();
            const messages = (data && data.success && Array.isArray(data.messages)) ? data.messages : [];
            if (messages.length === 0) {
                showEmptyState(true);
                return;
            }
            showEmptyState(false);
            for (const m of messages) {
                appendMessage(m.role === 'user' ? 'user' : 'assistant', m.content || '');
            }
            scrollToBottom();
        }

        questionInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        questionInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });

        function appendMessage(role, content) {
            const isUser = role === 'user';
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${isUser ? 'justify-end' : 'items-start'} ${isUser ? '' : 'gap-3'}`;
            
            const avatarHtml = isUser 
                ? '' 
                : `<div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="bot" class="w-5 h-5 text-indigo-600"></i>
                   </div>`;

            const safeHtml = DOMPurify.sanitize(marked.parse(content));
            
            wrapper.innerHTML = `
                ${avatarHtml}
                <div class="message-bubble ${isUser ? 'message-user' : 'message-ai'} p-4 rounded-2xl">
                    <div class="prose prose-sm ${isUser ? 'text-white' : 'text-gray-800'} max-w-none">
                        ${safeHtml}
                    </div>
                </div>
            `;
            
            messagesEl.appendChild(wrapper);
            if (!isUser) lucide.createIcons();
        }

        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.id = 'typing-indicator';
            indicator.className = 'flex items-start gap-3';
            indicator.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="bot" class="w-5 h-5 text-gray-500"></i>
                </div>
                <div class="message-bubble message-ai px-5 py-4 rounded-2xl flex space-x-1 items-center h-10">
                    <div class="typing-dot"></div>
                    <div class="typing-dot" style="animation-delay: 0.2s"></div>
                    <div class="typing-dot" style="animation-delay: 0.4s"></div>
                </div>
            `;
            messagesEl.appendChild(indicator);
            lucide.createIcons();
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        newSessionBtn.addEventListener('click', async () => {
            const sid = await createSession('新对话');
            if (!sid) return;
            await loadSessions(sid);
            showEmptyState(true);
            resetInputHeight();
            questionInput.value = '';
            questionInput.focus();
        });

        chatForm.addEventListener('submit', async e => {
            e.preventDefault();
            const question = questionInput.value.trim();
            if (!question) return;

            if (!currentSessionId) {
                const sid = await createSession('新对话');
                if (!sid) return;
                await loadSessions(sid);
            }

            showEmptyState(false);

            appendMessage('user', question);
            questionInput.value = '';
            resetInputHeight();
            sendBtn.disabled = true;
            
            showTypingIndicator();

            try {
                const response = await fetch('/chat/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        sessionId: currentSessionId,
                        question, 
                        modelType: modelTypeSelect.options[modelTypeSelect.selectedIndex].text 
                    })
                });
                
                const data = await response.json();
                removeTypingIndicator();
                
                if (data.success) {
                    appendMessage('assistant', data.Information);
                } else {
                    appendMessage('assistant', '⚠️ **系统错误**: ' + (data.message || '未知异常'));
                }
            } catch (err) {
                removeTypingIndicator();
                console.error(err);
                appendMessage('assistant', '❌ **连接失败**: 无法访问服务器，请检查网络。');
            } finally {
                sendBtn.disabled = false;
                questionInput.focus();
                scrollToBottom();
            }
        });

        renderSuggestions();
        showEmptyState(true);
        loadSessions().catch(() => {});
    </script>
</body>
</html>
