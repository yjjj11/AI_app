<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能助手 | libhv Service</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.0/dist/purify.min.js"></script>
    <link rel="stylesheet" href="/assets/theme.css">
    <script src="/assets/theme.js"></script>
    
    <style>
        body {
            font-family: 'Inter', "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }
        .glass {
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(31, 41, 55, 0.8);
        }
        .message-bubble {
            max-width: 85%;
            transition: all 0.2s ease;
        }
        .message-user {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message-ai {
            background: rgba(25, 30, 40, 0.92);
            color: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(10px);
            border-bottom-left-radius: 4px;
            box-shadow: 0 12px 24px -16px rgba(0, 0, 0, 0.6);
        }
        .message-ai .prose {
            color: rgba(255, 255, 255, 0.92);
            line-height: 1.7;
            font-size: 14px;
        }
        .message-ai .prose a {
            color: #a5b4fc;
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .message-ai .prose strong { color: rgba(255, 255, 255, 0.96); }
        .message-ai .prose code {
            background: rgba(0, 0, 0, 0.28);
            border: 1px solid rgba(255, 255, 255, 0.10);
            padding: 0.15rem 0.35rem;
            border-radius: 0.5rem;
            color: rgba(255, 255, 255, 0.92);
        }
        .message-ai .prose pre {
            background: rgba(0, 0, 0, 0.32);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 0.9rem;
            padding: 0.85rem 1rem;
            overflow: auto;
        }
        .message-ai .prose pre code {
            background: transparent;
            border: none;
            padding: 0;
        }
        .typing-dot {
            width: 6px;
            height: 6px;
            background: #9ca3af;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
</head>
<body class="theme h-screen overflow-hidden text-gray-100">
    <div class="h-full flex relative z-10">
        <aside class="w-[300px] tone-card tone-border border-r flex flex-col">
            <div class="h-16 px-4 flex items-center gap-3 border-b tone-border">
                <div class="bg-blue-600/90 p-2 rounded-xl shadow-sm">
                    <i data-lucide="bot" class="text-white w-6 h-6"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="text-sm font-semibold text-gray-100 truncate">AI Assistant</div>
                    <div class="text-xs text-gray-400 truncate">会话管理</div>
                </div>
            </div>

            <div class="p-4">
                <button id="newSessionBtn" type="button" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2.5 rounded-xl shadow-sm transition-colors">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    <span>新对话</span>
                </button>
            </div>

            <div class="px-2 pb-2 flex-1 overflow-y-auto">
                <div class="px-3 py-2 text-xs font-semibold text-gray-400">会话列表</div>
                <div id="sessionList" class="space-y-1"></div>
            </div>

            <div class="p-4 border-t tone-border">
                <button onclick="window.location.href='/login'" class="w-full flex items-center justify-center gap-2 text-gray-300 hover:text-red-400 transition-colors text-sm font-medium">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    <span>退出登录</span>
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col">
            <header class="h-16 tone-card tone-border border-b flex items-center justify-between px-6">
                <div class="flex items-center gap-2 text-gray-400">
                    <i data-lucide="messages-square" class="w-5 h-5"></i>
                    <span id="sessionTitle" class="text-sm font-medium text-gray-200 truncate max-w-[320px]">新对话</span>
                </div>

                <div class="flex items-center gap-3">
                    <div class="flex items-center space-x-2 bg-black/20 px-3 py-1.5 rounded-full border tone-border">
                        <i data-lucide="layers" class="w-4 h-4 text-gray-400"></i>
                        <div id="currentModelLabel" class="text-sm font-medium text-gray-200">通义千问</div>
                    </div>
                    <a id="openModelConfig" href="/settings.html" class="p-2 rounded-full border tone-border bg-black/20 hover:bg-black/30 text-gray-200 transition-colors">
                        <i data-lucide="settings" class="w-4 h-4"></i>
                    </a>
                </div>
            </header>

            <main class="flex-1 overflow-hidden">
                <div id="chatScroll" class="h-full overflow-y-auto px-4 sm:px-8 py-6">
                    <div class="max-w-4xl mx-auto">
                        <div id="emptyState" class="min-h-[calc(100vh-16rem)] flex flex-col items-center justify-center text-center gap-6">
                            <div class="text-3xl sm:text-4xl font-semibold text-gray-100">你好，我是 AI Assistant</div>
                            <div class="text-sm text-gray-400">你可以从下面挑选一个问题快速开始</div>
                            <div id="suggestions" class="flex flex-wrap justify-center gap-3 max-w-3xl"></div>
                        </div>

                        <div id="messages" class="space-y-4 hidden"></div>
                    </div>
                </div>
            </main>

            <footer class="p-4 sm:p-6 tone-card tone-border border-t">
                <div class="max-w-4xl mx-auto relative">
                    <form id="chat-form" class="relative">
                        <textarea 
                            id="question" 
                            rows="1" 
                            placeholder="请输入你的问题..."
                            class="w-full pl-4 pr-14 py-4 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none text-gray-100 placeholder:text-gray-500 leading-relaxed transition-all border tone-border bg-black/20"
                            required
                        ></textarea>
                        <input id="image-input" type="file" accept="image/*" multiple class="hidden" />
                        <button
                            type="button"
                            id="image-btn"
                            class="absolute right-14 top-2 bottom-2 text-gray-200/80 hover:text-white bg-black/10 hover:bg-black/20 p-3 rounded-xl transition-all active:scale-95"
                            title="添加图片"
                        >
                            <i data-lucide="image" class="w-5 h-5"></i>
                        </button>
                        <button 
                            type="submit" 
                            class="absolute right-2 top-2 bottom-2 bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl shadow-md transition-all hover:scale-105 active:scale-95 disabled:opacity-50 disabled:scale-100"
                            id="send-btn"
                        >
                            <i data-lucide="send" class="w-5 h-5"></i>
                        </button>
                    </form>
                    <div id="image-preview" class="mt-3 flex flex-wrap gap-2"></div>
                    <p class="text-center text-[10px] text-gray-500 mt-2">基于 libhv 构建的极简 AI 后端服务</p>
                </div>
            </footer>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const sessionList = document.getElementById('sessionList');
        const sessionTitle = document.getElementById('sessionTitle');
        const chatForm = document.getElementById('chat-form');
        const questionInput = document.getElementById('question');
        const sendBtn = document.getElementById('send-btn');
        const currentModelLabel = document.getElementById('currentModelLabel');
        const imageInput = document.getElementById('image-input');
        const imageBtn = document.getElementById('image-btn');
        const imagePreview = document.getElementById('image-preview');
        const newSessionBtn = document.getElementById('newSessionBtn');
        const chatScroll = document.getElementById('chatScroll');
        const emptyState = document.getElementById('emptyState');
        const messagesEl = document.getElementById('messages');
        const suggestionsEl = document.getElementById('suggestions');
        let currentSessionId = '';
        let sessionsCache = [];
        let pendingImages = [];

        const suggestionPresets = [
            '给我一个学习 C++ 的路线建议',
            '解释一下 JWT 的工作原理',
            '帮我写一个 MySQL 表设计用于聊天记录',
            '如何让我的接口更安全？',
            '给我一个前端页面布局优化建议',
            '如何做一次完整的服务端日志设计？'
        ];

        async function refreshActiveModelLabel() {
            try {
                const resp = await fetch('/llm/profiles', { method: 'GET' });
                const data = await resp.json();
                if (!data || !data.success) return;
                const activeKey = data.activeKey || '';
                const profiles = Array.isArray(data.profiles) ? data.profiles : [];
                if (!activeKey) {
                    currentModelLabel.textContent = '通义千问';
                    return;
                }
                if (activeKey === 'default') {
                    currentModelLabel.textContent = '通义千问';
                }
                const p = profiles.find(x => x && x.key === activeKey);
                const model = p && p.modelType ? String(p.modelType) : '';
                currentModelLabel.textContent = model ? model : activeKey;
                const supportsVision = !!(p && p.capabilities && p.capabilities.vision);
                imageBtn.disabled = !supportsVision;
                imageBtn.classList.toggle('opacity-50', !supportsVision);
                imageBtn.classList.toggle('cursor-not-allowed', !supportsVision);
                imageBtn.title = supportsVision ? '添加图片' : '当前模型不支持图片输入';
                if (!supportsVision) {
                    pendingImages = [];
                    imagePreview.innerHTML = '';
                    if (imageInput) imageInput.value = '';
                }
            } catch (_) {}
        }

        function showEmptyState(show) {
            emptyState.classList.toggle('hidden', !show);
            messagesEl.classList.toggle('hidden', show);
        }

        function resetInputHeight() {
            questionInput.style.height = 'auto';
        }

        function scrollToBottom() {
            chatScroll.scrollTo({ top: chatScroll.scrollHeight, behavior: 'smooth' });
        }

        function renderSuggestions() {
            suggestionsEl.innerHTML = '';
            for (const text of suggestionPresets) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'px-4 py-2 rounded-full bg-gray-900/60 border border-gray-800 text-sm text-gray-200 hover:border-blue-500/60 hover:text-blue-200 hover:bg-blue-600/10 transition-colors';
                btn.textContent = text;
                btn.addEventListener('click', () => {
                    questionInput.value = text;
                    questionInput.dispatchEvent(new Event('input'));
                    chatForm.dispatchEvent(new Event('submit'));
                });
                suggestionsEl.appendChild(btn);
            }
        }

        async function createSession(title = '') {
            const resp = await fetch('/chat/session/new', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title })
            });
            const data = await resp.json();
            if (data && data.success && data.sessionId) {
                return data.sessionId;
            }
            return '';
        }

        async function deleteSession(sessionId) {
            const resp = await fetch('/chat/session/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId })
            });
            return resp.ok;
        }

        function renderSessionList() {
            sessionList.innerHTML = '';
            for (const s of sessionsCache) {
                const item = document.createElement('button');
                item.type = 'button';
                const active = s.sessionId === currentSessionId;
                item.className = [
                    'group w-full text-left px-3 py-2 rounded-xl border transition-colors',
                    active ? 'bg-blue-600/10 border-blue-500/40' : 'bg-gray-900/40 border-transparent hover:bg-gray-900/60 hover:border-gray-800'
                ].join(' ');
                item.innerHTML = `
                    <div class="flex items-start gap-2">
                        <div class="mt-[2px] text-gray-400">
                            <i data-lucide="message-circle" class="w-4 h-4"></i>
                        </div>
                        <div class="min-w-0 flex-1">
                            <div class="text-sm font-medium ${active ? 'text-blue-200' : 'text-gray-100'} truncate">${(s.title || '新对话')}</div>
                            <div class="text-xs text-gray-500 truncate">${s.sessionId}</div>
                        </div>
                        <div class="flex-shrink-0">
                            <button type="button" data-delete-session-id="${s.sessionId}" class="opacity-0 group-hover:opacity-100 transition-opacity text-red-400 hover:text-red-300 p-1 rounded-lg hover:bg-red-500/10">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                `;
                item.addEventListener('click', async () => {
                    if (s.sessionId === currentSessionId) return;
                    currentSessionId = s.sessionId;
                    localStorage.setItem('chat_current_session', currentSessionId);
                    sessionTitle.textContent = s.title || '新对话';
                    renderSessionList();
                    await loadHistory(currentSessionId);
                });
                sessionList.appendChild(item);
            }
            lucide.createIcons();

            sessionList.querySelectorAll('[data-delete-session-id]').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const sid = btn.getAttribute('data-delete-session-id');
                    if (!sid) return;
                    const ok = window.confirm('确认删除该会话？该会话下的聊天记录也会被删除。');
                    if (!ok) return;

                    const deleted = await deleteSession(sid);
                    if (!deleted) {
                        alert('删除失败，请稍后重试。');
                        return;
                    }

                    if (sid === currentSessionId) {
                        localStorage.removeItem('chat_current_session');
                    }
                    await loadSessions();
                });
            });
        }

        async function loadSessions(preferSessionId = '') {
            const resp = await fetch('/chat/sessions?limit=50');
            const data = await resp.json();
            const sessions = (data && data.success && Array.isArray(data.sessions)) ? data.sessions : [];
            sessionsCache = sessions;

            if (sessionsCache.length === 0) {
                const sid = await createSession('新对话');
                if (!sid) return;
                sessionsCache = [{ sessionId: sid, title: '新对话', createdAtMs: Date.now() }];
            }

            const stored = localStorage.getItem('chat_current_session') || '';
            const candidate = preferSessionId || stored || sessionsCache[0].sessionId;
            currentSessionId = sessionsCache.some(s => s.sessionId === candidate) ? candidate : sessionsCache[0].sessionId;
            localStorage.setItem('chat_current_session', currentSessionId);

            const active = sessionsCache.find(s => s.sessionId === currentSessionId);
            sessionTitle.textContent = (active && active.title) ? active.title : '新对话';

            renderSessionList();
            await loadHistory(currentSessionId);
        }

        function clearMessages() {
            messagesEl.innerHTML = '';
        }

        async function loadHistory(sessionId) {
            clearMessages();
            if (!sessionId) {
                showEmptyState(true);
                return;
            }
            const resp = await fetch('/chat/history', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId, limit: 200, offset: 0 })
            });
            const data = await resp.json();
            const messages = (data && data.success && Array.isArray(data.messages)) ? data.messages : [];
            if (messages.length === 0) {
                showEmptyState(true);
                return;
            }
            showEmptyState(false);
            for (const m of messages) {
                appendMessage(m.role === 'user' ? 'user' : 'assistant', m.content || '');
            }
            scrollToBottom();
        }

        questionInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        questionInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });

        function appendMessage(role, content, imageDataUrls = []) {
            const isUser = role === 'user';
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${isUser ? 'justify-end' : 'items-start'} ${isUser ? '' : 'gap-3'}`;
            
            const avatarHtml = isUser 
                ? '' 
                : `<div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="bot" class="w-5 h-5 text-indigo-600"></i>
                   </div>`;

            const safeHtml = DOMPurify.sanitize(marked.parse(content));
            const imgs = Array.isArray(imageDataUrls) && imageDataUrls.length
                ? `<div class="mt-3 flex flex-wrap gap-2">
                    ${imageDataUrls.map(u => `<img src="${u}" class="w-24 h-24 object-cover rounded-xl border tone-border bg-black/20" />`).join('')}
                   </div>`
                : '';
            
            wrapper.innerHTML = `
                ${avatarHtml}
                <div class="message-bubble ${isUser ? 'message-user' : 'message-ai'} p-4 rounded-2xl">
                    <div class="prose prose-sm ${isUser ? 'text-white' : 'text-gray-100'} max-w-none">
                        ${safeHtml}
                    </div>
                    ${isUser ? imgs : ''}
                </div>
            `;
            
            messagesEl.appendChild(wrapper);
            if (!isUser) lucide.createIcons();
            return wrapper;
        }

        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.id = 'typing-indicator';
            indicator.className = 'flex items-start gap-3';
            indicator.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="bot" class="w-5 h-5 text-gray-500"></i>
                </div>
                <div class="message-bubble message-ai px-5 py-4 rounded-2xl flex space-x-1 items-center h-10">
                    <div class="typing-dot"></div>
                    <div class="typing-dot" style="animation-delay: 0.2s"></div>
                    <div class="typing-dot" style="animation-delay: 0.4s"></div>
                </div>
            `;
            messagesEl.appendChild(indicator);
            lucide.createIcons();
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        function renderImagePreview() {
            imagePreview.innerHTML = '';
            for (const item of pendingImages) {
                const wrap = document.createElement('div');
                wrap.className = 'relative w-20 h-20';
                wrap.innerHTML = `
                    <img src="${item}" class="w-20 h-20 object-cover rounded-xl border tone-border bg-black/20" />
                    <button type="button" class="absolute -top-2 -right-2 w-6 h-6 rounded-full bg-black/70 border tone-border text-white text-xs leading-6">×</button>
                `;
                const btn = wrap.querySelector('button');
                btn.addEventListener('click', () => {
                    pendingImages = pendingImages.filter(x => x !== item);
                    renderImagePreview();
                });
                imagePreview.appendChild(wrap);
            }
        }

        imageBtn.addEventListener('click', () => {
            imageInput.click();
        });

        imageInput.addEventListener('change', async () => {
            const files = Array.from(imageInput.files || []);
            const remain = Math.max(0, 4 - pendingImages.length);
            const picked = files.slice(0, remain);
            for (const f of picked) {
                if (!f || !f.type || !f.type.startsWith('image/')) continue;
                if (f.size > 2 * 1024 * 1024) continue;
                const dataUrl = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(String(reader.result || ''));
                    reader.onerror = () => resolve('');
                    reader.readAsDataURL(f);
                });
                if (!dataUrl) continue;
                pendingImages.push(dataUrl);
            }
            renderImagePreview();
            imageInput.value = '';
        });

        newSessionBtn.addEventListener('click', async () => {
            const sid = await createSession('新对话');
            if (!sid) return;
            await loadSessions(sid);
            showEmptyState(true);
            resetInputHeight();
            questionInput.value = '';
            questionInput.focus();
        });

        chatForm.addEventListener('submit', async e => {
            e.preventDefault();
            const question = questionInput.value.trim();
            if (!question) return;

            if (!currentSessionId) {
                const sid = await createSession('新对话');
                if (!sid) return;
                await loadSessions(sid);
            }

            showEmptyState(false);

            const images = pendingImages.slice();
            appendMessage('user', question, images);
            questionInput.value = '';
            resetInputHeight();
            sendBtn.disabled = true;
            
            showTypingIndicator();

            try {
                const response = await fetch('/chat/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        sessionId: currentSessionId,
                        question, 
                        images
                    })
                });

                if (!response.ok || !response.body) {
                    removeTypingIndicator();
                    appendMessage('assistant', '⚠️ **系统错误**: 服务端返回异常。');
                    return;
                }

                let assistantWrapper = null;
                let assistantText = '';
                const decoder = new TextDecoder();
                const reader = response.body.getReader();
                let buf = '';

                const updateAssistant = () => {
                    if (!assistantWrapper) return;
                    const prose = assistantWrapper.querySelector('.prose');
                    if (!prose) return;
                    const safeHtml = DOMPurify.sanitize(marked.parse(assistantText));
                    prose.innerHTML = safeHtml;
                    scrollToBottom();
                };

                const drain = () => {
                    while (true) {
                        let pos = buf.indexOf('\n\n');
                        let dlen = 2;
                        const pos2 = buf.indexOf('\r\n\r\n');
                        if (pos === -1 || (pos2 !== -1 && pos2 < pos)) {
                            pos = pos2;
                            dlen = 4;
                        }
                        if (pos === -1) break;

                        const block = buf.slice(0, pos);
                        buf = buf.slice(pos + dlen);

                        let eventType = 'message';
                        let dataStr = '';
                        for (const rawLine of block.split('\n')) {
                            const line = rawLine.endsWith('\r') ? rawLine.slice(0, -1) : rawLine;
                            if (line.startsWith('event:')) {
                                eventType = line.slice(6).trim();
                            } else if (line.startsWith('data:')) {
                                dataStr += line.slice(5).trim();
                            }
                        }

                        if (!dataStr) continue;

                        let payload = null;
                        try {
                            payload = JSON.parse(dataStr);
                        } catch (_) {
                            continue;
                        }

                        if (eventType === 'delta' && payload.delta) {
                            if (!assistantWrapper) {
                                removeTypingIndicator();
                                assistantWrapper = appendMessage('assistant', '');
                            }
                            assistantText += payload.delta;
                            updateAssistant();
                        } else if (eventType === 'error') {
                            removeTypingIndicator();
                            appendMessage('assistant', '⚠️ **系统错误**: ' + (payload.error || '未知异常'));
                        } else if (eventType === 'done') {
                            removeTypingIndicator();
                            pendingImages = [];
                            imagePreview.innerHTML = '';
                            if (imageInput) imageInput.value = '';
                        }
                    }
                };

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buf += decoder.decode(value, { stream: true });
                    drain();
                }

                drain();

                if (!assistantWrapper) {
                    removeTypingIndicator();
                    appendMessage('assistant', '⚠️ **系统错误**: 未收到有效响应。');
                }
            } catch (err) {
                removeTypingIndicator();
                console.error(err);
                appendMessage('assistant', '❌ **连接失败**: 无法访问服务器，请检查网络。');
            } finally {
                sendBtn.disabled = false;
                questionInput.focus();
                scrollToBottom();
            }
        });

        renderSuggestions();
        showEmptyState(false);
        loadSessions().catch(() => {});
        refreshActiveModelLabel();
    </script>
</body>
</html>
